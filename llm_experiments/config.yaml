llm:
  active_models:
    - id: "sabiazinho-4"
      provider: "maritaca"
      adapter: "maritaca"
    - id: "sabia-4"
      provider: "maritaca"
      adapter: "maritaca"
    - id: "tucano2-qwen-3.7b-think"
      provider: "local"
      adapter: "tucano"
      huggingface_id: "Polygl0t/Tucano2-qwen-3.7B-Think"
    - id: "jurema-7b"
      provider: "local"
      adapter: "jurema"
      huggingface_id: "Jurema-br/Jurema-7B"
    - id: "llama-3.2-1b"
      provider: "local"
      adapter: "llama"
      huggingface_id: "meta-llama/Llama-3.2-1B-Instruct"
    - id: "llama-3.2-3b"
      provider: "local"
      adapter: "llama"
      huggingface_id: "meta-llama/Llama-3.2-3B-Instruct"
  maritaca:
    base_url: "https://chat.maritaca.ai/api"
    timeout: 30.0
  local:
    device: "cuda"
    quantization: "4bit"

sidra:
  api:
    base_url: "https://servicodados.ibge.gov.br/api/v3"
    timeout: 30.0
  defaults:
    all_sentinel: "all"

cache:
  table_name: "distributions"
  default_source: "sidra"

persona_generation:
  default_amount: 1
  json_indent: 2

paths:
  distributions_db: "src/data/distributions.db"
  report_dir: "src/reports"
  report_images_subdir: "images"
  report_filename: "simulacao_opiniao_report.md"

